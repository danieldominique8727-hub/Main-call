<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>100% Accuracy AI Sync</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
</head>
<body>
    <div class="header">
        <div class="controls">
            <label>Photo: <input type="file" id="imageInput" accept="image/*"></label>
            <label>Video: <input type="file" id="videoInput" accept="video/*"></label>
            <button id="renderBtn">START HIGH-SYNC RENDER</button>
        </div>
        <div id="status">READY: UPLOAD FILES</div>
    </div>

    <div class="display-container">
        <video id="driverVideo" style="display:none;" playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
